<!DOCTYPE html>

<head>

  <style>
    :root{
      --bg:#06070A; --surface:#0E0F1A; --border:#20223A; --text:#EDEDF5; --sec:#B7B7CE; --muted:#7A7C99;
      --cyan:#22D3EE; --magenta:#E23FA9; --amber:#F5B301;
      --prism:linear-gradient(90deg,#22D3EE 0%,#E23FA9 52%,#F5B301 100%);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:"Space Grotesk",system-ui,-apple-system,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
    a{color:inherit;text-decoration:none}
    .prism-top{height:3px;background:var(--prism)}
    header{padding:20px}
    .brand{font-weight:700;font-size:20px;letter-spacing:-.02em;display:inline-flex;align-items:center;gap:9px}
    .brand .dot{width:11px;height:11px;border-radius:50%;background:var(--prism)}
    main{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px 20px 60px}
    .box{max-width:560px;width:100%}
    .eyebrow{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--cyan);font-weight:600;margin-bottom:16px}
    h1{font-size:clamp(32px,7vw,52px);line-height:1.05;letter-spacing:-.03em;font-weight:700;margin-bottom:16px}
    h1 em{font-family:"Instrument Serif",Georgia,serif;font-style:italic;font-weight:400;background:var(--prism);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    p.lead{font-size:18px;color:var(--sec);margin-bottom:34px}
    .stores{display:flex;flex-wrap:wrap;gap:14px;justify-content:center}
    .store{display:inline-flex;align-items:center;gap:12px;padding:14px 24px;border-radius:15px;background:#0b0c15;border:1px solid var(--border);transition:transform .15s ease,border-color .15s ease}
    .store:hover{transform:translateY(-2px);border-color:var(--magenta)}
    .store svg{width:28px;height:28px;flex:none}
    .store .s1{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;line-height:1.1;text-align:left}
    .store .s2{font-size:18px;font-weight:600;line-height:1.2;text-align:left}
    .hl{outline:2px solid transparent;border-image:var(--prism) 1}
    .web{margin-top:30px;font-size:15px;color:var(--muted)}
    .web a{color:var(--cyan);font-weight:600}
    footer{text-align:center;padding:24px;color:var(--muted);font-size:13px;border-top:1px solid var(--border)}
    footer a:hover{color:var(--cyan)}
  </style>
</head>
<body>
  <div class="prism-top"></div>
  <header><a class="brand" href="/"><span class="dot"></span> GigBridge</a></header>
  <main>
    <div class="box">
      <div class="eyebrow">Ücretsiz İndir</div>
      <h1>Canlı müzik, <em>cebinde.</em></h1>
      <p class="lead">Yakınındaki konserleri, DJ setlerini ve akustik geceleri keşfet. Sanatçıysan sahne bul; mekansan sanatçı bul.</p>
      <div class="stores">
        <a class="store" id="ios" href="#" aria-label="App Store'dan indir">
          <svg viewBox="0 0 24 24" fill="#fff"><path d="M16.4 12.7c0-2.2 1.8-3.3 1.9-3.3-1-1.5-2.6-1.7-3.2-1.7-1.4-.1-2.7.8-3.4.8-.7 0-1.8-.8-2.9-.8-1.5 0-2.9.9-3.6 2.2-1.6 2.7-.4 6.8 1.1 9 .7 1.1 1.6 2.3 2.7 2.2 1.1 0 1.5-.7 2.8-.7 1.3 0 1.6.7 2.8.7 1.2 0 1.9-1.1 2.6-2.1.8-1.2 1.2-2.4 1.2-2.4-.1 0-2.3-.9-2.3-3.5zM14.2 6.2c.6-.7 1-1.8.9-2.8-.9 0-2 .6-2.6 1.3-.6.6-1 1.7-.9 2.7 1 .1 2-.5 2.6-1.2z"/></svg>
          <span><span class="s1">İndir</span><br><span class="s2">App Store</span></span>
        </a>
        <a class="store" id="android" href="#" aria-label="Google Play'den indir">
          <svg viewBox="0 0 24 24"><path d="M3.6 2.4 13 12 3.6 21.6c-.4-.2-.6-.6-.6-1.1V3.5c0-.5.2-.9.6-1.1z" fill="#22D3EE"/><path d="M16.7 8.7 13 12l-9.4-9.6c.2-.1.5-.1.8.1l12.3 6.2z" fill="#E23FA9"/><path d="M16.7 15.3 4.4 21.5c-.3.2-.6.2-.8.1L13 12l3.7 3.3z" fill="#F5B301"/><path d="m16.7 8.7 3.9 2c.6.3.6 1.3 0 1.6l-3.9 2L13 12l3.7-3.3z" fill="#22D3EE"/></svg>
          <span><span class="s1">İndir</span><br><span class="s2">Google Play</span></span>
        </a>
      </div>
      <p class="web">Uygulama mağazan yok mu? <a href="https://gigbridges.com/#/kesfet">Web'de keşfet →</a></p>
    </div>
  </main>
  <footer>
    <a href="/">Ana Sayfa</a> &nbsp;·&nbsp; <a href="/canli-muzik/istanbul/">İstanbul Canlı Müzik</a> &nbsp;·&nbsp; <a href="/gizlilik.html">Gizlilik</a>
  </footer>

  <script>
    // ⚠️ MAĞAZA LİNKLERİ — tek kaynak. Gerçek ID'ler netleşince BURAYI güncelle:
    //   - iOS: App Store Connect'te uygulama yayınlanınca gerçek "id##########" ile değiştir.
    //   - Android: paket adı com.erberkay.gigbridge (Play'de yayınlanınca aktif olur).
    var IOS_URL = "https://apps.apple.com/tr/app/gigbridge/id0000000000";      // TODO: gerçek App Store ID
    var ANDROID_URL = "https://play.google.com/store/apps/details?id=com.erberkay.gigbridge";
    var WEB_FALLBACK = "https://gigbridges.com/#/kesfet";
    // iOS linki hâlâ placeholder ise (id0000000000), 404 yerine web keşfete düşür.
    var iosHref = IOS_URL.indexOf("id0000000000") === -1 ? IOS_URL : WEB_FALLBACK;
    document.getElementById("ios").href = iosHref;
    document.getElementById("android").href = ANDROID_URL;
    // Mobil ziyaretçiyi kendi mağazasına doğru yönlendir (vurgula).
    var ua = navigator.userAgent || "";
    if (/iPhone|iPad|iPod/i.test(ua)) document.getElementById("ios").classList.add("hl");
    else if (/Android/i.test(ua)) document.getElementById("android").classList.add("hl");
  </script>
</body>
</html>
