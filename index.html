<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GigBridge · Panel</title>
  <meta name="description" content="GigBridge web paneli — mekan, organizatör ve yönetici girişi." />
  <!-- Uygulama logosu — tarayıcı sekmesi (favicon) + Apple dokunma ikonu -->
  <link rel="icon" type="image/png" sizes="256x256" href="favicon.png" />
  <link rel="shortcut icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="icon.png" />
  <meta name="theme-color" content="#0a0a0f" />
  <!-- Hız: bağlantıları erkenden kur (ikon CDN'i + Firebase + Google API'leri) -->
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://securetoken.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://firebasestorage.googleapis.com" crossorigin />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="style.css?v=20260706h" />
  <!-- Aether editorial dark overlay (style.css'ten SONRA) -->
  <link rel="stylesheet" href="aether.css?v=20260706h" />
  <!-- Kritik JS modüllerini paralel önyükle (şelaleyi kır) -->
  <link rel="modulepreload" href="js/app.js" />
  <link rel="modulepreload" href="js/firebase.js" />
  <link rel="modulepreload" href="js/store.js" />
  <link rel="modulepreload" href="js/ui.js" />
  <link rel="modulepreload" href="js/data.js" />
  <link rel="modulepreload" href="js/pages/auth.js" />
  <link rel="modulepreload" href="js/pages/customer.js" />
  <link rel="modulepreload" href="js/pages/messages.js" />
  <!-- App ile aynı ikon seti (Ionicons) — jsdelivr daha hızlı + iyi önbellek -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
  <div id="app">
    <div class="boot"><div class="spinner"></div></div>
  </div>
  <div id="toasts"></div>
  <div id="modal-root"></div>
  <script type="module" src="js/app.js"></script>
  <!-- Service worker: her deploy'da JS/CSS otomatik taze gelsin (cache takılması bitsin) -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
    }
  </script>
</body>
</html>
